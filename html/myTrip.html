<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한태우의 여행 추억들</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>🌍 한태우의 여행 추억들 🎵</h1>
        <audio controls>
        <source src="../media/여행음악.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <hr>
    <div class="trip-grid-container">
        <p class="trip-card">
            <img src="../media/대만.jpg" width="400" height="200" alt="대만"><br>친구들과 대만 여행
        </p>
        <p class="trip-card">
            <img src="../media/고베.jpg" width="400" height="200" alt="세부 탑스힐 "><br>고베의 아름다운 바다
        </p>
        <p class="trip-card">
            <img src="../media/사가.jpg" width="400" height="200" alt="훗카이도 대설산"><br>조용하고 아름다운 사가
        </p>
    </div>
    <hr>
    <h2>📹 여행 라이브포토</h2>
    <p>
        <video width="400" height="225" controls>
            <source src="../media/라이브포토.MOV" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <br>여행과 어울리는 음악 ✈️
    </p>
    </div>
</body>
</html>
